<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadowfist card</title>
    <link rel="stylesheet" href="NewStyles.css">
</head>

<body>
    <!-- Navigation Bar -->
    <header class="top-nav">
        <div class="nav-title">Shadowfist Database</div>
        <div class="nav-actions">
            <button class="nav-login-btn" id="navAccountButton" onclick="handleNavAccount()">
                Login
            </button>
        </div>
    </header>

    <main class="details-page">
        <section class="card-header-box">
            <div class="card-image-panel">
                <img id="cardImage" src="https://via.placeholder.com/300x420.png?text=Card+Image" alt="Card Image">
            </div>

            <div class="card-info-panel">
                <h1 class="card-name">Card Name here</h1>
                <div class="card-subtiltes">
                    <span class="card-type">Card Type</span>
                    <span class="card-subtype">Card Subtype</span>
                    <span class="card-faction">Card Faction</span>
                </div>
                <p class="card-flavor-text">Flavor text</p>
            </div>

            <div class="stats-panel">
                <div class="stat-box">
                    <h3>Cost</h3>
                    <p id="cardCost">#</p>
                </div>
                <div class="stat-box">
                    <h3>Power</h3>
                    <p id="cardPower">#</p>
                </div>
                <div class="stat-box">
                    <h3>Bod</h3>
                    <p id="cardBod">#</p>
                </div>
                <div class="stat-box">
                    <h3>Res</h3>
                    <p id="cardRes">#</p>
                </div>
            </div>

            <div class="meta-grid">
                <div><strong>ID:</strong> <span id="cardID">-</span></div>
                <div><strong>Rarity:</strong> <span id="cardRarity">-</span></div>
                <div><strong>Set:</strong> <span id="cardSet">-</span></div>
                <div><strong>Unique:</strong> <span id="cardUnique">-</span></div>
            </div>
        </section>

        <section class="info-section">
            <h2>Keywords / Traits</h2>
            <div class="info-box" id="cardKeywords">
                <p>Keyword 1</p>
                <p>Keyword 2</p>
                <p>Keyword 3</p>
            </div>
        </section>

        <section class="info-section">
            <h2>Notes</h2>
            <div class="info-box" id="cardNotes">
                <p>Extra card/game notes or rulings</p>
            </div>
        </section>

        <section class="info-section">
            <h2>Deck Options</h2>
            <div class="info-box deck-options-box">
                <label for="deckSelect">Select Deck</label>
                <select id="deckSelect">
                    <option value="">Loading decks...</option>
                </select>

                <button type="button" class="primary-action" onclick="addCurrentCardToDeck()">
                    Add Card to Deck
                </button>

                <p id="deckMessage"></p>
            </div>
        </section>

        <script>
            function loadCard() {

                // 🔥 DEBUG: check if data exists
                const stored = sessionStorage.getItem("selectedCard");
                console.log("SESSION RAW:", stored);

                if (!stored) {
                    console.error("No card found in sessionStorage");
                    return;
                }

                const card = JSON.parse(stored);
                console.log("PARSED CARD:", card);

                // 🃏 Main info
                document.querySelector(".card-name").textContent = card.Title || "Unknown";

                document.querySelector(".card-subtype").textContent = card.subtype || "-";

                // Stats
                document.getElementById("cardCost").textContent = card.Cost || "-";
                document.getElementById("cardPower").textContent = card.Pow || "-";
                document.getElementById("cardBod").textContent = card.Bod || "-";
                document.getElementById("cardRes").textContent = card.Res || "-";

                // Meta (optional — will stay "-" if missing)
                document.getElementById("cardID").textContent = card.id || "-";
                document.getElementById("cardRarity").textContent = card.Rarity || "-";
                document.getElementById("cardSet").textContent = card.Expansion || "-";
                document.getElementById("cardUnique").textContent = card.Unique || "-";

                // Flavor (if exists)
                const flavor = document.querySelector(".card-flavor-text");
                if (flavor) {
                    flavor.textContent = card.Flav || "";
                }
            }

            loadCard();
            </script>
    </main>

<script>
function updateNavButton() {
    const button = document.getElementById("navAccountButton");
    const username = sessionStorage.getItem("username");

    if (!button) return;

    if (username) {
        button.textContent = "My Account";
    } else {
        button.textContent = "Login";
    }
}

function handleNavAccount() {
    const username = sessionStorage.getItem("username");

    if (username) {
        window.location.href = "Account.html";
    } else {
        window.location.href = "Login.html";
    }
}

// Run when page loads
window.addEventListener("DOMContentLoaded", updateNavButton);
</script>

<script>
async function loadDeckOptions() {
    const username = sessionStorage.getItem("username");
    const deckSelect = document.getElementById("deckSelect");

    if (!username) {
        deckSelect.innerHTML = '<option value="">Log in to use decks</option>';
        return;
    }

    const response = await fetch("/user-decks", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: username })
    });

    const data = await response.json();
    deckSelect.innerHTML = '<option value="">Select a deck</option>';

    if (!data.decks || Object.keys(data.decks).length === 0) {
        deckSelect.innerHTML = '<option value="">No decks found</option>';
        return;
    }

    for (const deckName in data.decks) {
        const option = document.createElement("option");
        option.value = deckName;
        option.textContent = deckName;
        deckSelect.appendChild(option);
    }
}

async function addCurrentCardToDeck() {
    const username = sessionStorage.getItem("username");
    const deckName = document.getElementById("deckSelect").value;
    const messageBox = document.getElementById("deckMessage");

    if (!username) {
        messageBox.textContent = "You must log in before adding cards to a deck.";
        return;
    }

    if (!deckName) {
        messageBox.textContent = "Select a deck first.";
        return;
    }

    const params = new URLSearchParams(window.location.search);
    const cardID = params.get("id") || document.getElementById("cardID").textContent || "placeholder001";

    const card = JSON.parse(sessionStorage.getItem("selectedCard"));

    const response = await fetch("/add-card", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: username,
            deckName: deckName,
            cardID: card.id,
            cardName: card.Title
        })
    });

    const data = await response.json();
    messageBox.textContent = data.message;
}

window.addEventListener("DOMContentLoaded", loadDeckOptions);
</script>

</body>
</html>

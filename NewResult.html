<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadowfist card</title>
    <link rel="stylesheet" href="NewStyles.css">
</head>
<body>
    <main class="details-page">
        <section class="card-header-box">
            <div class="card-image-panel">
                <img id="cardImage" src="https://via.placeholder.com/300x420.png?text=Card+Image" alt="Card Image">
            </div>

            <div class="card-info-panel">
                <h1 class="card-name">Card Name here</h1>
                <p class="card-subtiltes">
                    <span class="card-type">Card Type</span>
                    <span class="card-subtype">Card Subtype</span>
                    <span class="card-faction">Card Faction</span>
                </p>
                <p class="card-flavor-text">Flavor text</p>
            </div>

            <div class="stats-panel">
                <div class="stat-box">
                    <h3>Cost</h3>
                    <p id="cardCost">#</p>
                </div>
                <div class="stat-box">
                    <h3>Power</h3>
                    <p id="cardPower">#</p>
                </div>
                <div class="stat-box">
                    <h3>Bod</h3>
                    <p id="cardBod">#</p>
                </div>
                <div class="stat-box">
                    <h3>Res</h3>
                    <p id="cardRes">#</p>
                </div>
            </div>

            <div class="meta-grid">
                <div><strong>ID:</strong> <span id="cardID">-</span></div>
                <div><strong>Rarity:</strong> <span id="cardRarity">-</span></div>
                <div><strong>Set:</strong> <span id="cardSet">-</span></div>
                <div><strong>Unique:</strong> <span id="cardUnique">-</span></div>
            </div>
        </section>

        <section class="info-section">
            <h2>Keywords / Traits</h2>
            <div class=""info-box" id=""cardKeywords>
                <p>Keyword 1</p>
                <p>Keyword 2</p>
                <p>Keyword 3</p>
            </div>
        </section>

        <section class="info-section">
            <h2>Notes</h2>
            <div class="info-box" id="cardNotes">
                <p>Extra card/game notes or rulings</p>
            </div>
        </section>
        <script>
            function loadCard() {

                // 🔥 DEBUG: check if data exists
                const stored = sessionStorage.getItem("selectedCard");
                console.log("SESSION RAW:", stored);

                if (!stored) {
                    console.error("No card found in sessionStorage");
                    return;
                }

                const card = JSON.parse(stored);
                console.log("PARSED CARD:", card);

                // 🃏 Main info
                document.querySelector(".card-name").textContent = card.Title || "Unknown";

                document.querySelector(".card-subtype").textContent = card.subtype || "-";

                // Stats
                document.getElementById("cardCost").textContent = card.Cost || "-";
                document.getElementById("cardPower").textContent = card.Pow || "-";
                document.getElementById("cardBod").textContent = card.Bod || "-";
                document.getElementById("cardRes").textContent = card.Res || "-";

                // Meta (optional — will stay "-" if missing)
                document.getElementById("cardID").textContent = card.id || "-";
                document.getElementById("cardRarity").textContent = card.Rarity || "-";
                document.getElementById("cardSet").textContent = card.Expansion || "-";
                document.getElementById("cardUnique").textContent = card.Unique || "-";

                // Flavor (if exists)
                const flavor = document.querySelector(".card-flavor-text");
                if (flavor) {
                    flavor.textContent = card.Flav || "";
                }
            }

            loadCard();
            </script>
    </main>
</body>

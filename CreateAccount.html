<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Shadowfist Account</title>
    <link rel="stylesheet" href="Styles.css">
</head>
<body class="page-shell">
    <main class="page-frame auth-page">
        <section class="panel-box">
            <div class="panel-header">
                <h3 class="eyebrow">Shadowfist Database</h3>
                <h1>Create Account</h1>
                <p class="panel-subtext">Create a new account to save decks and manage your collection.</p>
            </div>

            <form class="stack-form">
                <div class="field-group">
                    <label for="createUsername">Username</label>
                    <input type="text" id="createUsername" name="createUsername" placeholder="Choose a username">
                </div>

                <div class="field-group">
                    <label for="createPassword">Password</label>
                    <input type="password" id="createPassword" name="createPassword" placeholder="Create a password">
                </div>

                <div class="field-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password">
                </div>

                <div id="createMessageBox" class="status-banner error-banner" style="display: none;"></div>

                <div class="button-row centered-row">
                    <button type="button" class="primary-action" onclick="createAccount()">Create Account</button>
                    <button type="button" class="secondary-action" onclick="location.href='Login.html'">Back to Login</button>
                </div>
            </form>
        </section>
    </main>

<script>
function showCreateMessage(message) {
    const box = document.getElementById("createMessageBox");
    box.style.display = "block";
    box.textContent = message;
}

function clearCreateMessage() {
    const box = document.getElementById("createMessageBox");
    box.style.display = "none";
    box.textContent = "";
}

async function createAccount() {
    clearCreateMessage();

    const username = document.getElementById("createUsername").value;
    const password = document.getElementById("createPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (password !== confirmPassword) {
        showCreateMessage("Passwords do not match.");
        return;
    }

    const response = await fetch("/create-account", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    const data = await response.json();

    if (data.status === "success") {
        window.location.href = "Login.html";
    } else {
        showCreateMessage(data.message);
    }
}
</script>

</body>
</html>

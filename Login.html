<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadowfist Login</title>
    <link rel="stylesheet" href="Styles.css">
</head>
<body class="page-shell">
    <main class="page-frame auth-page">
        <section class="panel-box">
            <div class="panel-header">
                <h3 class="eyebrow">Shadowfist Database</h3>
                <h1>Login</h1>
                <p class="panel-subtext">Enter your account information to access decks, saved cards, and search tools.</p>
            </div>

            <form class="stack-form">
                <div class="field-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" name="loginUsername" placeholder="Enter username">
                </div>

                <div class="field-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="loginPassword" placeholder="Enter password">
                </div>

                <div id="authMessageBox" class="error-box" style="display: none;"></div>

                <div class="button-row centered-row">
                    <button type="button" class="primary-action" onclick="loginUser()">Log In</button>
                    <button type="button" class="secondary-action" onclick="location.href='CreateAccount.html'">Create Account</button>
                </div>
            </form>

            <div class="panel-footer-links">
                <a href="Search.html">Continue as Guest</a>
            </div>
        </section>
    </main>

<script>
function showLoginMessage(message) {
    const box = document.getElementById("authMessageBox");
    box.style.display = "block";
    box.textContent = message;
}

function clearLoginMessage() {
    const box = document.getElementById("authMessageBox");
    box.style.display = "none";
    box.textContent = "";
}

async function loginUser() {
    clearLoginMessage();

    const username = document.getElementById("loginUsername").value;
    const password = document.getElementById("loginPassword").value;

    const response = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    const data = await response.json();

    if (data.status === "success") {
        sessionStorage.setItem("username", data.username);
        window.location.href = "Search.html";
    } else {
        showLoginMessage(data.message);
    }
}
</script>

</body>
</html>

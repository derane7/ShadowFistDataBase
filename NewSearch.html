<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadowfist Search</title>
    <link rel="stylesheet" href="NewStyles.css">
</head>
<body>

    <header class="top-nav">
        <div class="nav-title">Shadowfist Database</div>
        <div class="nav-actions">
            <button class="nav-login-btn" onclick="location.href='Login.html'">
                Login
            </button>
        </div>
    </header>

    <main class="search-page">
        <section class="search-panel">
            <div class="panel-header">
                <h1>Search Cards</h1>
                <p class="panel-subtext">
                    Search Shadowfist cards by subtype, stats, and keywords.
                </p>
            </div>

            <form class="search-form" onsubmit="event.preventDefault(); submitFilters();">
                <div class="subtype-row">
                    <label for="subtype" class="subtype-label">Subtypes</label>

                    <div class="subtype-field">
                        <select name="subtype" id="subtype" multiple class="search-select">
                            <option value="Feng Shui Sites">Feng Shui Sites</option>
                            <option value="Unaligned Characters">Unaligned Characters</option>
                            <option value="Unaligned Sites">Unaligned Sites</option>
                            <option value="Unaligned States">Unaligned States</option>
                            <option value="Unaligned Edges">Unaligned Edges</option>
                            <option value="Chi Sites">Chi Sites</option>
                            <option value="Chi Events">Chi Events</option>
                            <option value="Chi States">Chi States</option>
                            <option value="High-Tech Sites">High-Tech Sites</option>
                            <option value="High-Tech Events">High-Tech Events</option>
                            <option value="High-Tech States">High-Tech States</option>
                            <option value="High-Tech Edges">High-Tech Edges</option>
                            <option value="Magic Characters">Magic Characters</option>
                            <option value="Magic Sites">Magic Sites</option>
                            <option value="Magic Events">Magic Events</option>
                            <option value="Magic States">Magic States</option>
                            <option value="Magic Edges">Magic Edges</option>
                            <option value="Dragon Characters">Dragon Characters</option>
                            <option value="Guiding Hand Characters">Guiding Hand Characters</option>
                            <option value="Guiding Hand Sites">Guiding Hand Sites</option>
                            <option value="Guiding Hand Events">Guiding Hand Events</option>
                            <option value="Guiding Hand States">Guiding Hand States</option>
                            <option value="Guiding Hand Edges">Guiding Hand Edges</option>
                            <option value="Eaters of the Lotus Characters">Eaters of the Lotus Characters</option>
                            <option value="Eaters of the Lotus Sites">Eaters of the Lotus Sites</option>
                            <option value="Eaters of the Lotus Events">Eaters of the Lotus Events</option>
                            <option value="Eaters of the Lotus States">Eaters of the Lotus States</option>
                            <option value="Eaters of the Lotus Edges">Eaters of the Lotus Edges</option>
                            <option value="Ascended Characters">Ascended Characters</option>
                            <option value="Ascended Sites">Ascended Sites</option>
                            <option value="Ascended Events">Ascended Events</option>
                            <option value="Ascended States">Ascended States</option>
                            <option value="Ascended Edges">Ascended Edges</option>
                            <option value="Architects of the Flesh Characters">Architects of the Flesh Characters</option>
                            <option value="Architects of the Flesh Sites">Architects of the Flesh Sites</option>
                            <option value="Architects of the Flesh Events">Architects of the Flesh Events</option>
                            <option value="Architects of the Flesh States">Architects of the Flesh States</option>
                            <option value="Architects of the Flesh Edges">Architects of the Flesh Edges</option>
                            <option value="Four Monarchs Characters">Four Monarchs Characters</option>
                            <option value="Four Monarchs Events">Four Monarchs Events</option>
                            <option value="Four Monarchs States">Four Monarchs States</option>
                            <option value="Four Monarchs Edges">Four Monarchs Edges</option>
                            <option value="Jammer Characters">Jammer Characters</option>
                            <option value="Jammer Sites">Jammer Sites</option>
                            <option value="Jammer Events">Jammer Events</option>
                            <option value="Jammer States">Jammer States</option>
                            <option value="Jammer Edges">Jammer Edges</option>
                        </select>
                    </div>
                </div>

                <p class="helper-text centered-helper">If these values do not apply, leave them blank.</p>

                <div class="stats-two-column">
                    <div class="stats-column">
                        <div class="field-group">
                            <label for="set1">Cost</label>
                            <input type="text" id="set1" name="set1" placeholder="Cost...">
                        </div>

                        <div class="field-group">
                            <label for="set3">Bod</label>
                            <input type="text" id="set3" name="set3" placeholder="Bod...">
                        </div>
                    </div>

                    <div class="stats-column">
                        <div class="field-group">
                            <label for="set2">Fight</label>
                            <input type="text" id="set2" name="set2" placeholder="Fight...">
                        </div>

                        <div class="field-group">
                            <label for="set4">Res</label>
                            <input type="text" id="set4" name="set4" placeholder="Res...">
                        </div>
                    </div>
                </div>

                <div class="keywords-block">
                    <div class="field-group">
                        <label for="keywordSearch" class="keywords-label">Keywords</label>
                        <input type="text" placeholder="Search..." id="keywordSearch">
                    </div>
                </div>

                <div class="button-row centered-row">
                    <button type="submit" id="submitButton" class="primary-action">Search</button>
                </div>
            </form>
        </section>

        <section id="results-container" class="search-panel" style="display: none;">
            <div class="panel-header">
                <h2>Search Results</h2>
            </div>
            <ul id="results-list" class="results-list"></ul>
        </section>
    </main>

    <script>
        async function submitFilters() {
            const resultsContainer = document.getElementById("results-container");
            const resultsList = document.getElementById("results-list");

            resultsContainer.style.display = "block";
            resultsList.innerHTML = "<li>Loading...</li>";

            const rawFilters = {
                subtype: Array.from(document.getElementById("subtype").selectedOptions).map(o => o.value),
                set1: document.getElementById("set1").value,
                set2: document.getElementById("set2").value,
                set3: document.getElementById("set3").value,
                set4: document.getElementById("set4").value,
                keywordSearch: document.getElementById("keywordSearch").value
            };

            function normalizeValue(v) {
                if (Array.isArray(v)) return v.join(" ");
                if (v === null || v === undefined) return "";
                return String(v).trim();
            }

            const normalized = {};
            for (const k in rawFilters) {
                normalized[k] = normalizeValue(rawFilters[k]);
            }

            const filters = {
                set1: normalized.set1 || "",
                set2: normalized.set2 || "",
                set3: normalized.set3 || "",
                set4: normalized.set4 || "",
                subtype: normalized.subtype || "",
                keywordSearch: normalized.keywordSearch || ""
            };

            console.log("SENDING FILTERS:", filters);

            try {
                const res = await fetch("", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(filters)
                });

                const data = await res.json();
                const cards = data.results || [];

                resultsList.innerHTML = "";

                if (cards.length === 0) {
                    resultsList.innerHTML = "<li>No results found.</li>";
                    return;
                }

                cards.forEach(card => {
                    const li = document.createElement("li");
                    li.className = "result-item";

                    li.innerHTML = `
                        <div class="card-result">
                            <h3>${card.name ?? "Unnamed Card"}</h3>
                            <p><strong>Cost:</strong> ${card.set1 ?? "N/A"}</p>
                            <p><strong>Fight:</strong> ${card.set2 ?? "N/A"}</p>
                            <p><strong>Bod:</strong> ${card.set3 ?? "N/A"}</p>
                            <p><strong>Res:</strong> ${card.set4 ?? "N/A"}</p>
                            <p><strong>Subtype:</strong> ${card.subtype ?? "N/A"}</p>

                            <div class="button-row">
                                <button type="button" class="secondary-action" onclick="goToCard('${card.id}')">View Card</button>
                                <button type="button" class="secondary-action">Add To Decklist</button>
                            </div>
                        </div>
                    `;

                    resultsList.appendChild(li);
                });

            } catch (err) {
                console.error("Search error:", err);
                resultsList.innerHTML = "<li>Error fetching results.</li>";
            }
        }

        function goToCard(id) {
            window.location.href = `NewResult.html?id=${encodeURIComponent(id)}`;
        }
    </script>

</body>
</html>
